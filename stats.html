<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Slowly Enhance - 详细统计</title>
  <style>
    :root {
      --primary: #667eea;
      --primary-dark: #764ba2;
      --primary-light: #a78bfa;
      --primary-bg: #f8f9ff;
      --bg: #f5f6fa;
      --card-bg: white;
      --text: #333;
      --text-secondary: #555;
      --text-muted: #999;
      --border: #ddd;
      --bar-sent: linear-gradient(90deg, var(--primary), #7c6eea);
      --bar-received: linear-gradient(90deg, var(--primary-light), #c4b5fd);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding-bottom: 40px;
    }
    .top-bar {
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      color: white;
      padding: 24px 32px;
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .top-bar h1 { font-size: 22px; font-weight: 700; }
    .top-bar .sub { font-size: 13px; opacity: 0.8; margin-top: 4px; }

    .container { max-width: 960px; margin: 0 auto; padding: 24px; }

    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .tab {
      padding: 8px 18px;
      border-radius: 20px;
      border: 1px solid #ddd;
      background: white;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: all 0.2s;
    }
    .tab:hover { border-color: var(--primary); color: var(--primary); }
    .tab.active {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: white;
      border-color: transparent;
    }

    .card {
      background: var(--card-bg);
      border-radius: 14px;
      padding: 24px;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    }
    .card-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 16px;
    }

    .stat-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 16px;
    }
    .stat-row-3 {
      grid-template-columns: repeat(3, 1fr);
    }
    .stat-item {
      text-align: center;
      padding: 16px;
      background: var(--primary-bg);
      border-radius: 12px;
    }
    .stat-item .num {
      font-size: 28px;
      font-weight: 700;
      color: var(--primary);
    }
    .stat-item .label {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    .bar-chart { margin-top: 12px; }
    .bar-row {
      display: flex;
      align-items: center;
      margin-bottom: 8px;
      gap: 10px;
    }
    .bar-label {
      width: 120px;
      font-size: 13px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex-shrink: 0;
    }
    .bar-track {
      flex: 1;
      height: 24px;
      background: #f0f0f0;
      border-radius: 6px;
      overflow: hidden;
      display: flex;
    }
    .bar-fill-sent {
      height: 100%;
      background: var(--bar-sent);
      border-radius: 6px 0 0 6px;
      transition: width 0.5s ease;
    }
    .bar-fill-received {
      height: 100%;
      background: var(--bar-received);
      border-radius: 0 6px 6px 0;
      transition: width 0.5s ease;
    }
    .bar-value {
      width: 50px;
      text-align: right;
      font-size: 13px;
      font-weight: 600;
      color: var(--primary);
      flex-shrink: 0;
    }

    .legend {
      display: flex;
      gap: 16px;
      margin-bottom: 12px;
      font-size: 12px;
      color: #666;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 3px;
    }

    .timeline-chart {
      display: flex;
      align-items: flex-end;
      gap: 2px;
      height: 120px;
      margin-top: 12px;
      padding: 0 4px;
    }
    .timeline-bar {
      flex: 1;
      min-width: 3px;
      max-width: 20px;
      border-radius: 3px 3px 0 0;
      position: relative;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .timeline-bar:hover { opacity: 0.8; }
    .timeline-bar .tip {
      display: none;
      position: absolute;
      bottom: 100%;
      left: 50%;
      transform: translateX(-50%);
      background: #333;
      color: white;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 11px;
      white-space: nowrap;
      margin-bottom: 4px;
    }
    .timeline-bar:hover .tip { display: block; }

    .detail-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    .detail-table th {
      text-align: left;
      padding: 10px 12px;
      border-bottom: 2px solid #eee;
      color: #999;
      font-weight: 500;
      font-size: 12px;
    }
    .detail-table td {
      padding: 10px 12px;
      border-bottom: 1px solid #f5f5f5;
    }
    .detail-table tr:hover td { background: #fafafe; }

    .heatmap-wrap {
      overflow-x: auto;
      padding-bottom: 8px;
    }
    .heatmap {
      display: grid;
      grid-template-rows: repeat(7, 14px);
      grid-auto-flow: column;
      gap: 3px;
      width: max-content;
    }
    .hm-cell {
      width: 14px;
      height: 14px;
      border-radius: 3px;
      cursor: pointer;
      position: relative;
    }
    .hm-cell:hover { outline: 1px solid rgba(0,0,0,0.3); }
    .hm-cell .hm-tip {
      display: none;
      position: absolute;
      bottom: 100%;
      left: 50%;
      transform: translateX(-50%);
      background: #333;
      color: white;
      padding: 3px 8px;
      border-radius: 4px;
      font-size: 11px;
      white-space: nowrap;
      z-index: 10;
      margin-bottom: 4px;
    }
    .hm-cell:hover .hm-tip { display: block; }
    .hm-months {
      display: flex;
      font-size: 11px;
      color: #999;
      margin-bottom: 6px;
      padding-left: 0;
    }
    .hm-months span { flex-shrink: 0; }

    .chart-scroll {
      overflow-x: auto;
      padding-bottom: 6px;
    }
    .trend-svg {
      height: 160px;
      display: block;
    }

    .stamp-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 10px;
      margin-top: 12px;
    }
    .stamp-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      background: var(--primary-bg);
      border-radius: 10px;
    }
    .stamp-name {
      flex: 1;
      font-size: 12px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .stamp-count {
      font-size: 16px;
      font-weight: 700;
      color: var(--primary);
    }
    .stamp-icon {
      font-size: 20px;
    }
    .stamp-thumb {
      width: 36px;
      height: 36px;
      object-fit: contain;
      flex-shrink: 0;
      border-radius: 4px;
    }

    .country-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      gap: 10px;
      margin-top: 12px;
    }
    .country-item {
      text-align: center;
      padding: 14px 10px;
      background: var(--primary-bg);
      border-radius: 10px;
    }
    .country-flag { font-size: 28px; line-height: 1; }
    .country-code { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
    .country-count { font-size: 18px; font-weight: 700; color: var(--primary); margin-top: 2px; }

    .hour-chart-wrap {
      position: relative;
      margin-top: 12px;
    }
    .hour-zones {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 20px;
      display: flex;
      pointer-events: none;
      z-index: 0;
    }
    .hour-zone {
      flex: 1;
      display: flex;
      align-items: flex-end;
      justify-content: center;
    }
    .hour-zone-label {
      font-size: 10px;
      color: #bbb;
      margin-bottom: -16px;
    }
    .hour-chart {
      display: flex;
      align-items: flex-end;
      gap: 3px;
      height: 160px;
      padding: 0 2px;
      position: relative;
      z-index: 1;
    }
    .hour-bar-group {
      flex: 1;
      display: flex;
      align-items: flex-end;
      gap: 1px;
      height: 100%;
      position: relative;
    }
    .hour-bar-group:hover .hour-tooltip {
      display: block;
    }
    .hour-bar {
      flex: 1;
      border-radius: 2px 2px 0 0;
      min-width: 3px;
      transition: opacity 0.15s;
    }
    .hour-bar-mine {
      background: var(--primary, #667eea);
    }
    .hour-bar-friend {
      background: #f59e0b;
    }
    .hour-tooltip {
      display: none;
      position: absolute;
      bottom: 100%;
      left: 50%;
      transform: translateX(-50%);
      background: #333;
      color: white;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 11px;
      white-space: nowrap;
      z-index: 20;
      margin-bottom: 4px;
      pointer-events: none;
    }
    .hour-labels {
      display: flex;
      gap: 3px;
      padding: 0 2px;
      margin-top: 4px;
    }
    .hour-label {
      flex: 1;
      text-align: center;
      font-size: 9px;
      color: #aaa;
    }

    .export-section {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 12px;
    }
    .export-section .export-btn {
      float: none;
      margin-top: 0;
    }

    .empty-msg {
      text-align: center;
      padding: 60px 20px;
      color: #999;
      font-size: 14px;
    }

    .skeleton {
      position: relative;
      overflow: hidden;
      background: rgba(0,0,0,0.03);
      border-radius: 10px;
    }
    .skeleton::after {
      content: '';
      position: absolute;
      inset: 0;
      transform: translateX(-100%);
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.65), transparent);
      animation: sk 1.2s infinite;
    }
    @keyframes sk {
      100% { transform: translateX(100%); }
    }
    .sk-line { height: 12px; margin: 10px 0; }
    .sk-title { height: 18px; width: 220px; margin: 8px 0 14px; }
    .sk-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }
    .sk-card { height: 88px; }

    .export-btn {
      padding: 8px 20px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      float: right;
      margin-top: -8px;
    }
    .export-btn:hover { opacity: 0.9; }

    .wf-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }
    .wf-tab {
      padding: 6px 16px;
      border-radius: 16px;
      border: 1px solid var(--border);
      background: var(--card-bg);
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      transition: all 0.15s;
    }
    .wf-tab:hover { border-color: var(--primary); color: var(--primary); }
    .wf-tab.active {
      background: var(--primary);
      color: white;
      border-color: transparent;
    }
    .wf-cloud-wrap {
      position: relative;
      width: 100%;
      height: 320px;
      overflow: hidden;
    }
    .wf-cloud-wrap canvas {
      width: 100%;
      height: 100%;
      cursor: default;
    }
    .wf-cloud-tip {
      display: none;
      position: fixed;
      background: rgba(0,0,0,0.85);
      color: white;
      padding: 6px 14px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      white-space: nowrap;
      z-index: 100;
      pointer-events: none;
      line-height: 1.5;
      text-align: center;
    }

    .theme-switcher {
      display: flex;
      gap: 6px;
      align-items: center;
    }
    .theme-dot {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.3);
      cursor: pointer;
      transition: transform 0.15s, border-color 0.15s;
    }
    .theme-dot:hover { transform: scale(1.15); }
    .theme-dot.active { border-color: white; transform: scale(1.2); }
  </style>
</head>
<body>
  <div class="top-bar">
    <div>
      <h1>Slowly Enhance - 详细统计</h1>
      <div class="sub" id="topSub">加载中...</div>
    </div>
    <div class="theme-switcher" id="themeSwitcher"></div>
  </div>

  <div class="container">
    <div class="tabs" id="tabs"></div>
    <div id="mainContent">
      <div class="empty-msg">加载中...</div>
    </div>
  </div>

  <script src="lib/html2canvas.min.js"></script>
  <script src="stats.js"></script>
</body>
</html>
